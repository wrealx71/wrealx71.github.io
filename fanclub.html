        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Gaegu', 'Gamja Flower', 'Jua', 'Nanum Pen Script', monospace;

            font-family: 'Gaegu', 'Gamja Flower', 'Jua', cursive;
            background: linear-gradient(45deg, #ff4500, #ff8c00);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-decoration: none;
        }
        .back-btn {
            background: linear-gradient(45deg, #ff6600, #ff8c00);
            color: #000;

            text-decoration: none;

            background-position: center;
            height: 30vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .hero-small h1 {
            font-size: 2rem;
            font-family: 'Gaegu', 'Gamja Flower', 'Jua', cursive;
            color: #ffcc00;
        }
        .content-card {
            max-width: 600px;
            margin: 3rem auto;
            padding: 2rem;
            background: rgba(0,0,0,0.7);
            border-radius: 20px;
            border: 2px solid #ff6600;
            text-align: center;
        }
        .content-card h2 {
            font-size: 2rem;
            margin-bottom: 1rem;
            font-family: 'Gaegu', 'Gamja Flower', 'Jua', cursive;
            color: #ffaa66;
        }
        .whatsapp-btn {
            display: inline-block;
            background: linear-gradient(45deg, #25D366, #128C7E);
            color: white;
            padding: 1rem 2rem;
            font-size: 1.3rem;
            font-weight: bold;
            border-radius: 60px;
            text-decoration: none;
            margin: 1.5rem 0;
            font-family: 'Gaegu', 'Gamja Flower', 'Jua', monospace;
            transition: transform 0.2s;
        }
        .whatsapp-btn:hover { transform: scale(1.05); }
        .footer {
            text-align: center;
            padding: 1.5rem;
            border-top: 1px solid #ff6600;
            margin-top: 2rem;
            font-size: 0.7rem;
            color: #ffaa66;
        }
    </style>
</head>
<body>
    <div class="header">
