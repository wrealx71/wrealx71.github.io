<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>WREAL X - CONTACT</title>
    <link href="https://fonts.googleapis.com/css2?family=Gaegu&family=Gamja+Flower&family=Jua&family=Nanum+Pen+Script&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Gaegu', 'Gamja Flower', 'Jua', 'Nanum Pen Script', monospace;
            background: linear-gradient(135deg, #1a0000 0%, #3d0c0c 50%, #7a1f1f 100%);
            color: #fff2e6;
            line-height: 1.5;
            min-height: 100vh;
        }
        .header {
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(10px);
            padding: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #ff6600;
        }
        .logo {
            font-size: 1.5rem;
            font-weight: 900;
            font-family: 'Gaegu', 'Gamja Flower', 'Jua', cursive;
            background: linear-gradient(45deg, #ff4500, #ff8c00);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-decoration: none;
        }
        .back-btn {
            background: linear-gradient(45deg, #ff6600, #ff8c00);
            color: #000;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            font-family: 'Gaegu', 'Gamja Flower', 'Jua', monospace;
        }
        .hero-small {
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://iili.io/C9aXwuI.jpg');
            background-size: cover;
            background-position: center;
            height: 30vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .hero-small h1 {
            font-size: 2rem;
            font-family: 'Gaegu', 'Gamja Flower', 'Jua', cursive;
            color: #ffcc00;
        }
        .contact-grid {
            max-width: 800px;
            margin: 3rem auto;
            padding: 0 1rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }
        .contact-card {
            background: rgba(0,0,0,0.7);
            border-radius: 20px;
            border: 2px solid #ff6600;
            text-align: center;
            transition: transform 0.2s;
        }
        .contact-card:hover {
            transform: translateY(-3px);
        }
        .contact-link {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            padding: 1.5rem;
            text-decoration: none;
            color: #ffaa66;
            font-size: 1.3rem;
            font-weight: bold;
            font-family: 'Gaegu', 'Gamja Flower', 'Jua', monospace;
            transition: 0.2s;
        }
        .contact-link:hover {
            background: #ff4500;
            color: #000;
            border-radius: 20px;
        }
        .footer {
            text-align: center;
            padding: 1.5rem;
            border-top: 1px solid #ff6600;
            margin-top: 2rem;
            font-family: 'Gaegu', 'Gamja Flower', 'Jua', monospace;
            font-size: 0.7rem;
            color: #ffaa66;
        }
    </style>
</head>
<body>
    <div class="header">
        <a href="index.html" class="logo">WREAL X</a>
        <a href="index.html" class="back-btn">← BACK</a>
    </div>
    <div class="hero-small">
        <h1>📬 CONTACT</h1>
    </div>
    <div class="contact-grid">
        <div class="contact-card">
            <a href="mailto:wrealx@proton.me" class="contact-link">
                📧 ✉️ wrealx@proton.me
            </a>
        </div>
        <div class="contact-card">
            <a href="https://wa.me/211920146370" target="_blank" class="contact-link">
                💬 📱 WhatsApp: +211 920 146 370
            </a>
        </div>
        <div class="contact-card">
            <a href="https://www.instagram.com/wreal.x" target="_blank" class="contact-link">
                📷 🎭 Instagram: @wreal.x
            </a>
        </div>
    </div>
    <div class="footer"><p>© 2026 WREAL X | All Rights Reserved</p></div>
</body>
</html>
