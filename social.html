    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Playfair Display', serif; background: #000; color: #fff; }
        .header { background: #000; padding: 1rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #ffcc00; }
        .logo { font-size: 1.5rem; font-weight: 900; font-family: 'Cinema Decorative', cursive; color: #ffcc00; text-decoration: none; }
        .back-btn { background: #ffcc00; color: #000; padding: 0.5rem 1rem; border-radius: 5px; text-decoration: none; font-weight: bold; }
        .hero-small { background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://iili.io/C9aXwuI.jpg'); background-size: cover; background-position: center; height: 30vh; display: flex; align-items: center; justify-content: center; }
        .hero-small h1 { font-size: 2.5rem; font-family: 'Cinema Decorative', cursive; color: #ffcc00; text-align: center; }
        .socials-grid { max-width: 800px; margin: 3rem auto; padding: 0 1rem; display: flex; flex-direction: column; gap: 1rem; }
        .social-link { background: #111; border: 1px solid #333; border-radius: 60px; padding: 1rem 1.5rem; display: flex; align-items: center; gap: 1rem; text-decoration: none; color: #fff; transition: all 0.3s; }
        .social-link:hover { background: #ffcc00; color: #000; transform: translateX(5px); border-color: #ffcc00; }
        .social-link:hover .social-icon { filter: brightness(0); }
        .social-icon { width: 35px; height: 35px; transition: filter 0.3s; }
        .social-name { font-size: 1.2rem; font-weight: bold; flex: 1; }
        .arrow { font-size: 1.5rem; }
        .footer { text-align: center; padding: 1.5rem; border-top: 1px solid #333; margin-top: 2rem; }
        @media (max-width: 768px) {
            .hero-small h1 { font-size: 2rem; }
            .social-name { font-size: 1rem; }
        }
    </style>
</head>
