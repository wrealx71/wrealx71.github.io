<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>WREAL X WRLD - WATCH</title>
    <link href="https://fonts.googleapis.com/css2?family=Creepster&family=Playfair+Display:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Courier New', 'Playfair Display', monospace;
            background: #000;
            color: #fff;
        }
        .header {
            background: #000;
            padding: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #ffcc00;
        }
        .logo {
            font-size: 1.5rem;
            font-weight: 900;
            font-family: 'Creepster', 'Courier New', cursive;
            color: #ffcc00;
            text-decoration: none;
        }
        .back-btn {
            background: #ffcc00;
            color: #000;
            padding: 0.5rem 1rem;
            border-radius: 5px;
            text-decoration: none;
            font-weight: bold;
            font-family: 'Creepster', 'Courier New', cursive;
        }
        .hero-small {
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://iili.io/C9aXwuI.jpg');
            background-size: cover;
            background-position: center;
            height: 30vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .hero-small h1 {
            font-size: 2.5rem;
            font-family: 'Creepster', 'Courier New', cursive;
            color: #ffcc00;
        }
        /* Video grid - 2 columns on mobile, 4 on desktop */
        .video-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1.5rem;
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1rem;
        }
        @media (max-width: 900px) {
            .video-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 1rem;
            }
        }
        @media (max-width: 500px) {
            .video-grid {
                grid-template-columns: 1fr;
                gap: 1.5rem;
            }
        }
        .video-card {
            background: #111;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #333;
            transition: transform 0.2s, border-color 0.2s;
        }
        .video-card:hover {
            transform: translateY(-5px);
            border-color: #ffcc00;
        }
        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 aspect ratio */
            height: 0;
            overflow: hidden;
        }
        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
        .video-title {
            padding: 0.8rem;
            font-size: 0.8rem;
            text-align: center;
            font-weight: bold;
            color: #ffcc00;
            font-family: 'Courier New', monospace;
        }
        .footer {
            text-align: center;
            padding: 1.5rem;
            border-top: 1px solid #333;
            margin-top: 2rem;
            font-family: 'Courier New', monospace;
            font-size: 0.7rem;
        }
    </style>
</head>
<body>
    <div class="header">
        <a href="index.html" class="logo">WREAL X WRLD</a>
        <a href="index.html" class="back-btn">← BACK TO HOME</a>
    </div>
    <div class="hero-small">
        <h1>🎬 WATCH NOW</h1>
    </div>

    <div class="video-grid">
        <!-- Video 1: Hurry Up -->
        <div class="video-card">
            <div class="video-wrapper">
                <iframe src="https://www.youtube.com/embed/swCF5DMFquE" 
                        title="Wreal X - Hurry Up"
                        frameborder="0" 
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
                        referrerpolicy="strict-origin-when-cross-origin" 
                        allowfullscreen>
                </iframe>
            </div>
            <div class="video-title">Wreal X - Hurry Up</div>
        </div>

        <!-- Video 2: Number (ft Boii Mujung) -->
        <div class="video-card">

                <iframe src="https://www.youtube.com/embed/npL5BEmPgtk" 
                        title="Wreal X ft Boii Mujung - Number"
                        frameborder="0" 
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
                        referrerpolicy="strict-origin-when-cross-origin"

        </div>

        <!-- Video 3: Monalisa (ft Bu Man) -->
        <div class="video-card">
            <div class="video-wrapper">
                <iframe src="https://www.youtube.com/embed/T59z8NQ3OMA" 
                        title="Wreal X ft Bu Man - Monalisa"

                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"

                        allowfullscreen>
                </iframe>
            </div>
            <div class="video-title">Wreal X ft Bu Man - Monalisa</div>
        </div>

        <!-- Video 4: Photo (ft Khida) -->
        <div class="video-card">
            <div class="video-wrapper">
                <iframe src="https://www.youtube.com/embed/2H3Ei5EPkFc" 
                        title="Wreal X ft Khida - Photo"
                        frameborder="0" 
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
                        referrerpolicy="strict-origin-when-cross-origin"

                </iframe>
            </div>
            <div class="video-title">Wreal X ft Khida - Photo</div>
        </div>
    </div>

    <div class="footer">
        <p>© 2026 WREAL X WRLD | All Rights Reserved</p>
    </div>
</body>
</html>
