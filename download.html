            transition: transform 0.2s;

            flex-direction: row;
            flex-wrap: wrap;
        }
        .track-card:hover {

        .track-thumb {

            border-color: #ff8844;
        }
        .download-vid:hover {

        .download-audio {

        @media (max-width: 550px) {
