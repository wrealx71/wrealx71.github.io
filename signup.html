<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>WREAL X - SIGN UP</title>
    <link href="https://fonts.googleapis.com/css2?family=Gaegu&family=Gamja+Flower&family=Jua&family=Nanum+Pen+Script&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Gaegu', 'Gamja Flower', 'Jua', 'Nanum Pen Script', monospace;
            background: linear-gradient(135deg, #1a0000 0%, #3d0c0c 50%, #7a1f1f 100%);
            color: #fff2e6;
            min-height: 100vh;
        }
        .header {
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(10px);
            padding: 1rem;
            border-bottom: 2px solid #ff6600;
        }
        .logo {
            font-size: 1.5rem;
            font-weight: 900;
            font-family: 'Gaegu', 'Gamja Flower', 'Jua', cursive;
            background: linear-gradient(45deg, #ff4500, #ff8c00);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-decoration: none;
        }
        .signup-container {
            max-width: 500px;
            margin: 3rem auto;
            padding: 2rem;
            background: rgba(0,0,0,0.7);
            border-radius: 20px;
            border: 2px solid #ff6600;
            text-align: center;
        }
        .signup-container h1 {
            color: #ffcc00;
            margin-bottom: 0.5rem;
            font-family: 'Gaegu', 'Gamja Flower', 'Jua', cursive;
            font-size: 1.8rem;
        }
        .signup-container p {
            margin-bottom: 1.5rem;
            color: #ffaa66;
        }
        .signup-form {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .signup-form input {
            padding: 1rem;
            background: #1a0505;
            border: 2px solid #ff6600;
            border-radius: 10px;
            color: white;
            font-family: 'Gaegu', 'Gamja Flower', 'Jua', monospace;
            font-size: 1rem;
        }
        .signup-form button {
            padding: 1rem;
            background: linear-gradient(45deg, #ff6600, #ff8c00);
            color: #000;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            font-family: 'Gaegu', 'Gamja Flower', 'Jua', monospace;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .signup-form button:hover {
            transform: scale(1.02);
        }
        .footer {
            text-align: center;
            padding: 1rem;
            border-top: 1px solid #ff6600;
            margin-top: 2rem;
            font-size: 0.7rem;
            color: #ffaa66;
        }
    </style>
</head>
<body>
    <div class="header">
        <a href="index.html" class="logo">WREAL X</a>
    </div>
    <div class="signup-container" id="signupContainer">
        <h1>🎧 JOIN THE X FAMILY</h1>
        <p>Enter your email to access free downloads & exclusives</p>
        <form class="signup-form" method="POST" action="https://formspree.io/f/xzdwopey">
            <input type="email" name="email" placeholder="Your email address" required>
            <input type="hidden" name="_redirect" value="" id="redirectUrl">
            <button type="submit">🎵 JOIN NOW</button>
        </form>
        <p style="margin-top: 1rem; font-size: 0.8rem;">One time sign up. No spam, just music. 🔥</p>
    </div>
    <div class="footer">
        <p>© 2026 WREAL X | All Rights Reserved</p>
    </div>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const returnUrl = urlParams.get('return');
        const hasSignedUp = localStorage.getItem('wrealx_signedup');
        
        if (hasSignedUp && returnUrl) {
            window.location.href = returnUrl;
        }
        
        if (returnUrl) {
            document.getElementById('redirectUrl').value = returnUrl;
        }
        
        const form = document.querySelector('.signup-form');
        form.addEventListener('submit', function() {
            localStorage.setItem('wrealx_signedup', 'true');
        });
    </script>
</body>
</html>
